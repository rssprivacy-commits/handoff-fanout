name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest (${{ matrix.os }} / py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pytest
        run: |
          pytest -v --tb=short

      - name: Smoke-test console scripts
        shell: bash
        run: |
          handoff --version
          handoff --help >/dev/null
          handoff-dump --help >/dev/null
          handoff-watchdog --help >/dev/null || true   # watchdog --help may exit non-zero on some argparse setups
          handoff-heartbeat --help >/dev/null
          handoff-safe-commit --help >/dev/null

      - name: Smoke-test installer (no launchd / no hooks)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          export HANDOFF_HOME="${RUNNER_TEMP}/handoff-home"
          ./install/install.sh --home "$HANDOFF_HOME" --no-launchd --no-hooks
          test -d "$HANDOFF_HOME"
          test -f "$HANDOFF_HOME/config.json"
          # rerun should be idempotent
          ./install/install.sh --home "$HANDOFF_HOME" --no-launchd --no-hooks

  lint:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: pip install -e ".[lint]"

      - name: Lint
        run: ruff check src/ tests/

      - name: Format check
        run: ruff format --check src/ tests/

  build:
    name: build sdist + wheel
    runs-on: ubuntu-latest
    needs: [test, lint]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Inspect dist/
        run: ls -la dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*
          if-no-files-found: error
          retention-days: 7
